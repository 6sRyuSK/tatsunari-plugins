# Planned plugins not yet started. One [[plugin]] block each.
# Rendered into the README "Planned" catalog by tools/gen_catalog.py.
# Fields used: name, category, reference.
#
# Once a plugin is started (it has plugins/<slug>/plugin.toml), remove it from
# here so it shows under "In progress" / "Shipped" instead of "Planned".
#
# Example:
# [[plugin]]
# name      = "Bus Compressor"
# category  = "Dynamics"
# reference = "SSL G-series bus comp"
